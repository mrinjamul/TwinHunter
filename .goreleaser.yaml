# GoReleaser config
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    ldflags: >
      -X github.com/mrinjamul/twinhunter/cmd.Version={{ .Tag }}
      -X github.com/mrinjamul/twinhunter/cmd.GitCommit={{ .FullCommit }}
      -s -w
    goos:
      - linux
      - windows
      - darwin
      - freebsd
      - openbsd
      - netbsd
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarm: "7"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - vendor: mrinjamul
    homepage: https://github.com/mrinjamul/twinhunter
    maintainer: "Injamul M <mrinjamul@gmail.com>"
    description: "Fast duplicate file finder and cleaner CLI"
    license: MIT
    formats:
      - apk
      - deb
      - rpm

homebrew_casks:
  - name: twinhunter
    repository:
      owner: mrinjamul
      name: homebrew-main
      branch: main
    homepage: https://github.com/mrinjamul/twinhunter
    description: "Fast duplicate file finder and cleaner CLI"
    license: "MIT"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Casks

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
  groups:
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 10
    - title: Others
      order: 999

release:
  footer: |
    * * *
    Thoughts? Questions? We love hearing from you. Feel free to reach out on [Mail](mailto:mrinjamul@pm.me).
